name: Version Bump

# Runs after CI passes on main — bumps patch version only in workspaces
# that actually changed. Commits the result with [skip ci] so it doesn't
# trigger another full CI run.

on:
  workflow_run:
    workflows: ["CI"]
    types: [completed]
    branches: [main, master]

permissions:
  contents: write

jobs:
  bump:
    name: Patch version bump
    runs-on: ubuntu-latest
    if: ${{ github.event.workflow_run.conclusion == 'success' }}

    steps:
      - uses: actions/checkout@v6
        with:
          # Use a PAT if branch protection requires it; GITHUB_TOKEN works
          # for unprotected main branches.
          token: ${{ secrets.GITHUB_TOKEN }}
          fetch-depth: 2

      - uses: actions/setup-node@v6
        with:
          node-version: 22

      - name: Detect which workspaces changed
        id: changes
        run: |
          git diff --name-only HEAD~1 HEAD > /tmp/changed.txt
          echo "api=$(grep -qE '^api/' /tmp/changed.txt && echo true || echo false)" >> $GITHUB_OUTPUT
          echo "web=$(grep -qE '^web/' /tmp/changed.txt && echo true || echo false)" >> $GITHUB_OUTPUT
          echo "admin_web=$(grep -qE '^admin-web/' /tmp/changed.txt && echo true || echo false)" >> $GITHUB_OUTPUT

      - name: Bump api
        if: steps.changes.outputs.api == 'true'
        run: npm version patch --no-git-tag-version --workspace=api

      - name: Bump web
        if: steps.changes.outputs.web == 'true'
        run: npm version patch --no-git-tag-version --workspace=web

      - name: Bump admin-web
        if: steps.changes.outputs.admin_web == 'true'
        run: npm version patch --no-git-tag-version --workspace=admin-web

      - name: Commit and push
        run: |
          git diff --quiet && echo "No version changes to commit" && exit 0
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add api/package.json web/package.json admin-web/package.json
          git commit -m "chore: bump patch versions [skip ci]"
          git push
